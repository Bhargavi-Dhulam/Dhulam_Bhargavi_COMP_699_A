{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Join a Home</h2>

    <form method="POST" action="/join_home">

        <div class="form-group">
            <label for="home_id">Home ID</label>
            <input type="number" id="home_id" name="home_id" placeholder="Enter home ID" required>
        </div>

        <button type="submit" class="btn-primary">Join Home</button>

    </form>

    <div class="form-footer">
        <a href="/dashboard" class="btn-link">Back to Dashboard</a>
    </div>

</div>

{% endblock %}

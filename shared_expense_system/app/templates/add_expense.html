{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Add Shared Expense</h2>

    <form method="POST" action="/add_expense/{{ home_id }}">

        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" id="amount" name="amount" placeholder="Enter amount" required>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category" required>
                <option value="">Select category</option>
                <option value="Rent">Rent</option>
                <option value="Electricity">Electricity</option>
                <option value="Water">Water</option>
                <option value="Groceries">Groceries</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Optional note">
        </div>

        <button type="submit" class="btn-primary">Add Expense</button>

    </form>

    <div class="form-footer">
        <a href="/dashboard" class="btn-link">Back to Dashboard</a>
    </div>

</div>

{% endblock %}
